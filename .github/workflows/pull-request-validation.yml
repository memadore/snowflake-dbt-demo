---
name: Pull Request Validation
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
permissions:
  id-token: write
  contents: read
env:
  DBT_PROFILES_DIR: .github/configs/dbt/github
  DBT_ENV_SECRET_SNOWFLAKE_PASSWORD: '${{ secrets.SNOWFLAKE_PAT }}'
  DBT_SNOWFLAKE_ACCOUNT: '${{ vars.SNOWFLAKE_ACCOUNT }}'
  DBT_SNOWFLAKE_SCHEMA: github_pr_${{ github.event.number }}
jobs:
  pre-commit:
    name: validate::pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set the VIRTUAL_ENV variable for uv to work
        run: |
          echo "VIRTUAL_ENV=${Python_ROOT_DIR}" >> $GITHUB_ENV
      - name: Install project dependencies
        run: |
          uv sync --locked --all-extras --dev --active
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
  dbt-project-evaluator:
    name: validate::dbt-project-evaluator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install project dependencies
        run: uv sync --locked --all-extras --dev
      - name: Run dbt project evaluator
        env:
          DBT_PROJECT_EVALUATOR_ENABLED: "true"
          DBT_PROJECT_EVALUATOR_SEVERITY: error
        run: |
          uv run dbt deps
          uv run dbt build --select package:dbt_project_evaluator
