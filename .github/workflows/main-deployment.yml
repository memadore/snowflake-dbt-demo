---
name: Deploy the dbt project
on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  build-dbt-docs:
    name: build::dbt-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install project dependencies
        run: uv sync --locked --all-extras --dev
      - name: Generate the documentation
        env:
          DBT_PROFILES_DIR: .github/configs/dbt/github
          DBT_ENV_SECRET_SNOWFLAKE_PASSWORD: '${{ secrets.SNOWFLAKE_PAT }}'
          DBT_SNOWFLAKE_ACCOUNT: '${{ vars.SNOWFLAKE_ACCOUNT }}'
        run: |
          uv run dbt deps --target prod
          uv run dbt compile --threads 32 --target prod
          uv run dbt docs generate --static --target prod
      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3 # or specific "vX.X.X" version tag for this action
        with:
          path: target/
  deploy-dbt-docs:
    needs:
      - build-dbt-docs
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
  deploy-dbt-project:
    name: deploy::dbt-project::${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, uat, prod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install project dependencies
        run: uv sync --locked --all-extras --dev
      - uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          default-config-file-path: .github/configs/snowflake/connections.toml
          use-oidc: true
      - name: Deploy the dbt project to snowflake
        env:
          SNOWFLAKE_ACCOUNT: '${{ vars.SNOWFLAKE_ACCOUNT }}'
        run: |
          UV_PYTHON=$(cat .python-version)
          export UV_PYTHON
          uv run dbt deps
          snow connection test -c ${{ matrix.environment }}
          snow dbt deploy snowflake_dbt_demo --profiles-dir .github/configs/dbt/snowflake --default-target prod -c ${{ matrix.environment }}
