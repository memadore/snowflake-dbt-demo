---
version: 2
models:
  - name: stg_tpch_nations
    description: staging layer for nations data
    columns:
      - name: nation_key
        description: primary key of the model
        tests:
          - unique
          - not_null
      - name: name
        description: nation name
      - name: region_key
        description: foreign key to stg_tpch_regions
      - name: comment
        description: additional commentary
    meta:
      joins:
        - join: stg_tpch_regions
          sql_on: ${stg_tpch_nations.region_key} = ${stg_tpch_regions.region_key}
