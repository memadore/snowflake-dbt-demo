---
version: 2
models:
  - name: stg_tpcds_catalog_returns
    description: staging layer for catalog returns data from the TPC-DS dataset
    columns:
      - name: catalog_return_key
        description: surrogate primary key generated from item_key and order_number
        data_tests:
          - unique
          - not_null
      - name: returned_date_key
        description: foreign key to the date dimension representing the date the return occurred
      - name: returned_time_key
        description: foreign key to the time dimension representing the time the return occurred
      - name: item_key
        description: foreign key to the item dimension
      - name: refunded_customer_key
        description: foreign key to the customer dimension for the customer receiving the refund
      - name: refunded_customer_demographics_key
        description: foreign key to the customer demographics dimension for the refunded customer
      - name: refunded_household_demographics_key
        description: foreign key to the household demographics dimension for the refunded customer
      - name: refunded_address_key
        description: foreign key to the customer address dimension for the refunded customer
      - name: returning_customer_key
        description: foreign key to the customer dimension for the customer returning the item
      - name: returning_customer_demographics_key
        description: foreign key to the customer demographics dimension for the returning customer
      - name: returning_household_demographics_key
        description: foreign key to the household demographics dimension for the returning customer
      - name: returning_address_key
        description: foreign key to the customer address dimension for the returning customer
      - name: call_center_key
        description: foreign key to the call center dimension where the return was processed
      - name: catalog_page_key
        description: foreign key to the catalog page dimension from which the original item was ordered
      - name: ship_mode_key
        description: foreign key to the ship mode dimension used for the return shipment
      - name: warehouse_key
        description: foreign key to the warehouse dimension where the returned item is received
      - name: reason_key
        description: foreign key to the reason dimension describing why the item was returned
      - name: order_number
        description: the original catalog order number, part of the composite natural key
      - name: return_quantity
        description: number of units returned
      - name: return_amount
        description: total return amount before tax
      - name: return_tax
        description: tax amount on the return
      - name: return_amount_including_tax
        description: total return amount including tax
      - name: fee
        description: fee charged on the return transaction
      - name: return_ship_cost
        description: shipping cost associated with the return
      - name: refunded_cash
        description: cash amount refunded to the customer
      - name: reversed_charge
        description: charge amount reversed on the customer's account
      - name: store_credit
        description: store credit issued to the customer instead of cash refund
      - name: net_loss
        description: net loss to the catalog business from this return transaction
