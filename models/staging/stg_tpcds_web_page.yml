---
version: 2
models:
  - name: stg_tpcds_web_page
    description: staging layer for web page dimension data from the TPC-DS dataset
    columns:
      - name: web_page_key
        description: primary key of the model
        data_tests:
          - unique
          - not_null
      - name: web_page_id
        description: business identifier for the web page
      - name: record_start_date
        description: start date of the record's validity period (type 2 SCD)
      - name: record_end_date
        description: end date of the record's validity period (type 2 SCD)
      - name: creation_date_key
        description: foreign key to stg_tpcds_date_dim representing when the web page was created
      - name: access_date_key
        description: foreign key to stg_tpcds_date_dim representing the last access date of the web page
      - name: is_autogenerated
        description: flag indicating whether the web page was automatically generated
      - name: customer_key
        description: foreign key to stg_tpcds_customer representing the customer associated with the web page
      - name: url
        description: URL address of the web page
      - name: type
        description: type or category of the web page
      - name: character_count
        description: total number of characters on the web page
      - name: link_count
        description: number of hyperlinks on the web page
      - name: image_count
        description: number of images on the web page
      - name: max_ad_count
        description: maximum number of advertisements allowed on the web page
