---
version: 2
models:
  - name: fct_ops__catalog_return
    description: |
      Line-item fact table for catalog channel returns in the operations mart. Each row represents a single item returned from a catalog order, identified by the combination of item and order number. This is the richest return fact for operations analysis as it includes both warehouse and ship mode foreign keys, enabling detailed reverse logistics analysis by fulfillment facility and carrier method.
    config:
      group: operations
      contract:
        enforced: true
    columns:
      - name: catalog_return_key
        description: Surrogate primary key generated from item_key and order_number.
        data_type: varchar
        data_tests:
          - unique
          - not_null
      - name: returned_date_key
        description: Foreign key to dim_date representing the date the return was processed.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: returned_time_key
        description: Foreign key to dim_time representing the time the return was processed.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_time')
              field: time_key
      - name: item_key
        description: Foreign key to dim_item representing the product returned.
        data_type: number
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_item')
              field: item_key
      - name: refunded_customer_key
        description: Foreign key to dim_customer representing the customer receiving the refund.
        data_type: number
      - name: returning_customer_key
        description: Foreign key to dim_customer representing the customer initiating the return.
        data_type: number
      - name: call_center_key
        description: Foreign key to the call center dimension where the return was processed.
        data_type: number
      - name: catalog_page_key
        description: Foreign key to the catalog page dimension from which the original item was ordered.
        data_type: number
      - name: ship_mode_key
        description: Foreign key to dim_ship_mode representing the freight method used for the return shipment.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_ship_mode')
              field: ship_mode_key
      - name: warehouse_key
        description: Foreign key to dim_warehouse representing the facility where the returned item is received and restocked.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_warehouse')
              field: warehouse_key
      - name: reason_key
        description: Foreign key to the reason dimension describing why the item was returned.
        data_type: number
      - name: order_number
        description: Original catalog order number. Part of the composite natural key.
        data_type: number
        data_tests:
          - not_null
      - name: return_quantity
        description: Number of units returned in this line item.
        data_type: number
      - name: return_amount
        description: Total return amount before tax.
        data_type: number
      - name: return_tax
        description: Tax amount on the return.
        data_type: number
      - name: return_amount_including_tax
        description: Total return amount including tax.
        data_type: number
      - name: fee
        description: Fee charged on the return transaction.
        data_type: number
      - name: return_ship_cost
        description: Shipping cost associated with the return, key metric for reverse logistics cost analysis by carrier and warehouse.
        data_type: number
      - name: refunded_cash
        description: Cash amount refunded to the customer.
        data_type: number
      - name: reversed_charge
        description: Charge amount reversed on the customer's account.
        data_type: number
      - name: store_credit
        description: Store credit issued to the customer instead of cash refund.
        data_type: number
      - name: net_loss
        description: Net loss to the business from this return transaction.
        data_type: number
