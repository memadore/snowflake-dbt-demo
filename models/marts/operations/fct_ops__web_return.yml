---
version: 2
models:
  - name: fct_ops__web_return
    description: |
      Line-item fact table for web channel returns in the operations mart. Each row represents a single item returned from a web order, identified by the combination of item and order number. Used by operations to manage reverse logistics for e-commerce fulfillment, track return shipping volumes, and analyze web return patterns.
    config:
      group: operations
      contract:
        enforced: true
    columns:
      - name: web_return_key
        description: Surrogate primary key generated from item_key and order_number.
        data_type: varchar
        data_tests:
          - unique
          - not_null
      - name: returned_date_key
        description: Foreign key to dim_date representing the date the return was processed.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: returned_time_key
        description: Foreign key to dim_time representing the time the return was processed.
        data_type: number
        data_tests:
          - relationships:
              to: ref('dim_time')
              field: time_key
      - name: item_key
        description: Foreign key to dim_item representing the product returned.
        data_type: number
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_item')
              field: item_key
      - name: refunded_customer_key
        description: Foreign key to dim_customer representing the customer receiving the refund.
        data_type: number
      - name: returning_customer_key
        description: Foreign key to dim_customer representing the customer initiating the return.
        data_type: number
      - name: web_page_key
        description: Foreign key to the web page dimension from which the return was initiated.
        data_type: number
      - name: reason_key
        description: Foreign key to the reason dimension describing why the item was returned.
        data_type: number
      - name: order_number
        description: Original web order number. Part of the composite natural key.
        data_type: number
        data_tests:
          - not_null
      - name: return_quantity
        description: Number of units returned in this line item.
        data_type: number
      - name: return_amount
        description: Total return amount before tax.
        data_type: number
      - name: return_tax
        description: Tax amount on the return.
        data_type: number
      - name: return_amount_including_tax
        description: Total return amount including tax.
        data_type: number
      - name: fee
        description: Fee charged on the return transaction.
        data_type: number
      - name: return_ship_cost
        description: Shipping cost associated with the return, key metric for reverse logistics cost analysis.
        data_type: number
      - name: refunded_cash
        description: Cash amount refunded to the customer.
        data_type: number
      - name: reversed_charge
        description: Charge amount reversed on the customer's account.
        data_type: number
      - name: account_credit
        description: Account credit issued for the return instead of cash refund.
        data_type: number
      - name: net_loss
        description: Net loss to the business from this return transaction.
        data_type: number
