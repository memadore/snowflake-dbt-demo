---
version: 2
models:
  - name: dim_customer_address
    description: |
      Geographical location dimension for customer addresses. Used for shipping logistics, regional sales reporting, and timezone-based analysis. Joins to dim_customer via the current_address_key foreign key.
    config:
      contract:
        enforced: true
    columns:
      - name: address_key
        description: Surrogate key for the address dimension, used as the join key from dim_customer and fact tables.
        data_type: number
        data_tests:
          - unique
          - not_null
      - name: address_id
        description: Business identifier for the address.
        data_type: varchar
        data_tests:
          - not_null
      - name: street_number
        description: Street number of the address.
        data_type: varchar
      - name: street_name
        description: Street name of the address.
        data_type: varchar
      - name: street_type
        description: Street type (e.g., Ave, Blvd, St).
        data_type: varchar
      - name: suite_number
        description: Suite or unit number of the address.
        data_type: varchar
      - name: city
        description: City of the address.
        data_type: varchar
      - name: county
        description: County of the address.
        data_type: varchar
      - name: state
        description: State abbreviation of the address.
        data_type: varchar
      - name: zip_code
        description: Zip or postal code of the address.
        data_type: varchar
      - name: country
        description: Country of the address.
        data_type: varchar
      - name: gmt_offset
        description: GMT timezone offset for the address location, used for timezone-aware reporting.
        data_type: number
      - name: location_type
        description: Type of location (e.g., apartment, house, condo).
        data_type: varchar
