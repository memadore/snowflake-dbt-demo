---
version: 2
models:
  - name: dim_sls__web_page
    description: |
      Web page dimension for the sales mart. Contains metadata about individual landing pages on the company's e-commerce sites, including content metrics and page classification. Modeled as a slowly changing dimension (Type 2); use is_current_record to filter to the latest version or join on web_page_key for point-in-time fact accuracy.
    config:
      group: sales
      contract:
        enforced: true
    columns:
      - name: web_page_key
        description: Surrogate key for the web page dimension, used as the join key from web sales fact tables.
        data_type: number
        data_tests:
          - unique
          - not_null
      - name: web_page_id
        description: Business identifier for the web page. Shared across SCD versions.
        data_type: varchar
        data_tests:
          - not_null
      - name: url
        description: URL of the web page.
        data_type: varchar
      - name: type
        description: Classification type of the web page (e.g., welcome, protected, general).
        data_type: varchar
      - name: is_autogenerated
        description: Boolean flag indicating whether the page was auto-generated.
        data_type: boolean
      - name: character_count
        description: Total number of characters on the page.
        data_type: number
      - name: link_count
        description: Number of hyperlinks on the page.
        data_type: number
      - name: image_count
        description: Number of images on the page.
        data_type: number
      - name: max_ad_count
        description: Maximum number of advertisements displayed on the page.
        data_type: number
      - name: customer_key
        description: Foreign key to dim_customer representing the customer who created the page, if applicable.
        data_type: number
      - name: creation_date_key
        description: Foreign key to dim_date representing the date the page was created.
        data_type: number
      - name: access_date_key
        description: Foreign key to dim_date representing the last access date for the page.
        data_type: number
      - name: record_start_date
        description: Date when this version of the web page record became effective.
        data_type: date
      - name: record_end_date
        description: Date when this version of the web page record expired. Null if this is the currently active version.
        data_type: date
      - name: is_current_record
        description: Boolean flag indicating whether this is the currently active version of the web page record.
        data_type: boolean
