---
version: 2
models:
  - name: dim_sls__web_site
    description: |
      Web site dimension for the sales mart. Contains metadata about the company's e-commerce web properties including market classification and geographic details. Modeled as a slowly changing dimension (Type 2); use is_current_record to filter to the latest version or join on web_site_key for point-in-time fact accuracy.
    config:
      group: sales
      contract:
        enforced: true
    columns:
      - name: web_site_key
        description: Surrogate key for the web site dimension, used as the join key from web sales fact tables.
        data_type: number
        data_tests:
          - unique
          - not_null
      - name: web_site_id
        description: Business identifier for the web site. Shared across SCD versions.
        data_type: varchar
        data_tests:
          - not_null
      - name: name
        description: Name of the web site (e.g., site_0, site_1).
        data_type: varchar
      - name: class
        description: Classification tier of the web site.
        data_type: varchar
      - name: manager
        description: Full name of the web site manager.
        data_type: varchar
      - name: market_id
        description: Identifier for the market the web site serves.
        data_type: number
      - name: market_class
        description: Classification of the market segment.
        data_type: varchar
      - name: market_description
        description: Text description of the market segment.
        data_type: varchar
      - name: market_manager
        description: Full name of the market manager overseeing this web site.
        data_type: varchar
      - name: company_id
        description: Identifier for the parent company.
        data_type: number
      - name: company_name
        description: Name of the parent company.
        data_type: varchar
      - name: street_number
        description: Street number of the web site's physical office address.
        data_type: varchar
      - name: street_name
        description: Street name of the web site's physical office address.
        data_type: varchar
      - name: street_type
        description: Street type suffix (e.g., Ln, Cir., Dr.).
        data_type: varchar
      - name: suite_number
        description: Suite or unit number of the office address.
        data_type: varchar
      - name: city
        description: City where the web site office is located.
        data_type: varchar
      - name: county
        description: County where the web site office is located.
        data_type: varchar
      - name: state
        description: Two-letter state abbreviation where the web site office is located.
        data_type: varchar
      - name: zip_code
        description: ZIP code of the web site office location.
        data_type: varchar
      - name: country
        description: Country where the web site office is located.
        data_type: varchar
      - name: gmt_offset
        description: GMT timezone offset for the web site office location.
        data_type: number
      - name: tax_percentage
        description: Tax percentage applied to sales through this web site.
        data_type: number
      - name: open_date_key
        description: Foreign key to dim_date representing the date the web site was launched.
        data_type: number
      - name: close_date_key
        description: Foreign key to dim_date representing the date the web site was shut down. Null if still active.
        data_type: number
      - name: record_start_date
        description: Date when this version of the web site record became effective.
        data_type: date
      - name: record_end_date
        description: Date when this version of the web site record expired. Null if this is the currently active version.
        data_type: date
      - name: is_current_record
        description: Boolean flag indicating whether this is the currently active version of the web site record.
        data_type: boolean
