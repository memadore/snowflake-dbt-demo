---
version: 2
models:
  - name: dim_sls__call_center
    description: |
      Call center dimension for the sales mart. Contains metadata about the telephone order-intake facilities that process catalog sales, including staffing, location, and market classification. Modeled as a slowly changing dimension (Type 2); use is_current_record to filter to the latest version or join on call_center_key for point-in-time fact accuracy.
    config:
      group: sales
      contract:
        enforced: true
    columns:
      - name: call_center_key
        description: Surrogate key for the call center dimension, used as the join key from catalog sales fact tables.
        data_type: number
        data_tests:
          - unique
          - not_null
      - name: call_center_id
        description: Business identifier for the call center. Shared across SCD versions.
        data_type: varchar
        data_tests:
          - not_null
      - name: name
        description: Name of the call center (e.g., NY Metro, Mid Atlantic).
        data_type: varchar
      - name: class
        description: Size classification of the call center (e.g., small, medium, large).
        data_type: varchar
      - name: employee_count
        description: Number of employees at the call center.
        data_type: number
      - name: square_footage
        description: Total square footage of the call center facility.
        data_type: number
      - name: hours
        description: Operating hours of the call center (e.g., 8AM-4PM).
        data_type: varchar
      - name: manager
        description: Full name of the call center manager.
        data_type: varchar
      - name: market_id
        description: Identifier for the market the call center serves.
        data_type: number
      - name: market_class
        description: Classification of the market segment.
        data_type: varchar
      - name: market_description
        description: Text description of the market segment.
        data_type: varchar
      - name: market_manager
        description: Full name of the market manager overseeing this call center.
        data_type: varchar
      - name: division_id
        description: Identifier for the organizational division.
        data_type: number
      - name: division_name
        description: Name of the organizational division.
        data_type: varchar
      - name: company_id
        description: Identifier for the parent company.
        data_type: number
      - name: company_name
        description: Name of the parent company.
        data_type: varchar
      - name: street_number
        description: Street number of the call center address.
        data_type: varchar
      - name: street_name
        description: Street name of the call center address.
        data_type: varchar
      - name: street_type
        description: Street type suffix (e.g., Boulevard, Way, Cir.).
        data_type: varchar
      - name: suite_number
        description: Suite or unit number of the call center address.
        data_type: varchar
      - name: city
        description: City where the call center is located.
        data_type: varchar
      - name: county
        description: County where the call center is located.
        data_type: varchar
      - name: state
        description: Two-letter state abbreviation where the call center is located.
        data_type: varchar
      - name: zip_code
        description: ZIP code of the call center location.
        data_type: varchar
      - name: country
        description: Country where the call center is located.
        data_type: varchar
      - name: gmt_offset
        description: GMT timezone offset for the call center location.
        data_type: number
      - name: tax_percentage
        description: Tax percentage applied to sales processed by this call center.
        data_type: number
      - name: open_date_key
        description: Foreign key to dim_date representing the date the call center opened.
        data_type: number
      - name: closed_date_key
        description: Foreign key to dim_date representing the date the call center closed. Null if still operational.
        data_type: number
      - name: record_start_date
        description: Date when this version of the call center record became effective.
        data_type: date
      - name: record_end_date
        description: Date when this version of the call center record expired. Null if this is the currently active version.
        data_type: date
      - name: is_current_record
        description: Boolean flag indicating whether this is the currently active version of the call center record.
        data_type: boolean
