---
version: 2
models:
  - name: fct_orders
    description: orders fact table
    config:
      tags:
        - finance
    columns:
      - name: order_key
        description: primary key of the model
        data_tests:
          - unique
          - not_null
        meta:
          metrics:
            total_orders:
              type: sum
      - name: customer_key
        description: foreign key for customers
        data_tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_key
              severity: error
        meta:
          metrics:
            total_unique_customers:
              type: count_distinct
      - name: order_date
        description: date of the order
      - name: status_code
        description: status of the order
      - name: priority_code
        description: code associated with the order
      - name: clerk_name
        description: id of the clerk
      - name: ship_priority
        description: numeric representation of the shipping priority, zero being the default
      - name: order_count
        description: count of order
      - name: gross_item_sales_amount
        description: '{{ doc("gross_item_sales_amount") }}'
      - name: item_discount_amount
        description: '{{ doc("item_discount_amount") }}'
      - name: item_tax_amount
        description: '{{ doc("item_tax_amount") }}'
      - name: net_item_sales_amount
        description: '{{ doc("net_item_sales_amount") }}'
    meta:
      joins:
        - join: dim_customers
          sql_on: ${fct_orders.customer_key} = ${dim_customers.customer_key}
unit_tests:
  - name: fct_orders_test
    model: fct_orders
    given:
      - input: ref("stg_tpch_orders")
        format: csv
        fixture: stg_tpch_orders_fixture
      - input: ref("int_order_items")
        format: csv
        fixture: int_order_items_fixture
    expect:
      format: csv
      fixture: fct_orders_fixture
